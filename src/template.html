<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
</head>
<body>
  <div class="search">
      <input type="text" id="grad-input" placeholder="Unesi grad (npr. Beograd)" />
      <button id="pretrazi-btn">Pretraži</button>
    </div>

    <div id="greska" class="error hidden">Grad nije pronađen. Pokušaj ponovo.</div>

    <div id="loading" class="hidden">Učitavam podatke...</div>

    <div id="rezultat" class="weather-card hidden">
      <h2 id="lokacija"></h2>
      <!-- <img id="ikona" src="" alt="Vreme ikona" /> -->
      <p id="opis"></p>
      <p id="temperatura"></p>
      <p id="vlaznost"></p>
      <p id="vetar"></p>
      
      <button id="toggle-jedinica">Promeni na °F</button>
    </div>
  </div>
</body>
</html>
